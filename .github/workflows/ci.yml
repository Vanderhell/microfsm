name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          $CC --version
          make --version
        env:
          CC: ${{ matrix.cc }}

      - name: Build and run tests
        run: make clean all
        working-directory: tests
        env:
          CC: ${{ matrix.cc }}
